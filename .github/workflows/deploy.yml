name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/Ahnenbaum
            # Pre-deploy safety backup (ESM-compatible)
            docker compose -f docker-compose.prod.yml exec -T ahnenbaum \
              node --input-type=module -e "
                import Database from 'better-sqlite3';
                const db = new Database('/app/packages/server/data/ahnenbaum.db');
                const name = 'pre-deploy-' + new Date().toISOString().replace(/[:.]/g, '-') + '.db';
                db.backup('/app/packages/server/data/backups/' + name);
                console.log('Pre-deploy backup done: ' + name);
                db.close();
              " || echo 'Skipping pre-deploy backup (container not running)'
            git pull origin main
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
